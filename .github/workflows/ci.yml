name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  studio-api:
    name: studio-api (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio-api
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check studio_api tests

      - name: Test
        run: uv run pytest tests/ -v

  studio-web:
    name: studio-web (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio-web
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/studio-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Build
        run: pnpm build

  docker-build:
    name: docker-build (production image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: wisdom-studio:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image
        run: docker save wisdom-studio:ci -o /tmp/studio-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: studio-image
          path: /tmp/studio-image.tar
          retention-days: 1

  docker-smoke:
    name: docker-smoke (boot + health)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: studio-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/studio-image.tar

      - name: Boot container
        run: |
          docker run -d --name studio -p 3000:3000 \
            -e ANTHROPIC_API_KEY=dummy \
            wisdom-studio:ci

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/health > /dev/null; then
              echo "studio is up after ${i}s"
              curl -fsS http://localhost:3000/api/health
              exit 0
            fi
            sleep 1
          done
          echo "::error::studio failed to start within 60s"
          docker logs studio
          exit 1

      - name: Verify SPA shell at /
        run: |
          body=$(curl -fsS -H "accept: text/html" http://localhost:3000/)
          if echo "$body" | grep -qi "<html"; then
            echo "SPA shell served at /"
          else
            echo "::error::root path did not return SPA shell"
            echo "$body" | head -20
            exit 1
          fi

      - name: Dump logs on failure
        if: failure()
        run: docker logs studio
