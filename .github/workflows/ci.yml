name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio-api:
    name: studio-api (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio-api
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv + Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.10.9"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check studio_api tests

      - name: Test
        run: uv run pytest tests/ -v

  studio-web:
    name: studio-web (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio-web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d  # v6.0.5
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/studio-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Build
        run: pnpm build

  docker-build:
    name: docker-build (production image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Build production image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: .
          push: false
          load: true
          tags: wisdom-studio:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image
        run: docker save wisdom-studio:ci -o /tmp/studio-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: studio-image
          path: /tmp/studio-image.tar
          retention-days: 1

  docker-smoke:
    name: docker-smoke (boot + health)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: studio-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/studio-image.tar

      - name: Boot container
        run: |
          docker run -d --name studio -p 3000:3000 \
            -e ANTHROPIC_API_KEY=dummy \
            wisdom-studio:ci

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/health > /dev/null; then
              echo "studio is up after ${i}s"
              curl -fsS http://localhost:3000/api/health
              exit 0
            fi
            sleep 1
          done
          echo "::error::studio failed to start within 60s"
          docker logs studio
          exit 1

      - name: Verify SPA shell at /
        run: |
          body=$(curl -fsS -H "accept: text/html" http://localhost:3000/)
          if echo "$body" | grep -qi "<html"; then
            echo "SPA shell served at /"
          else
            echo "::error::root path did not return SPA shell"
            echo "$body" | head -20
            exit 1
          fi

      - name: Dump logs on failure
        if: failure()
        run: docker logs studio
