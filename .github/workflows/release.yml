name: release

on:
  push:
    tags:
      - 'v*.*.*'

# Repo-level: read-only by default. Each job below opts in to the
# narrower scope it actually needs (publishing the GHCR image needs
# `packages: write` and `id-token: write` for OIDC; nothing else does).
permissions: read-all

jobs:
  publish:
    name: build + push GHCR image (linux/amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: publish GitHub Release with CHANGELOG notes
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the section between "## [VERSION]" and the next "## [" header.
          # Write to a file (not a step output) so the next step can pass it
          # via --notes-file. Inlining the text via --notes interpolation
          # exposes any backticks or parens in the CHANGELOG to bash heredoc
          # parsing, which broke the v0.9.2 release publish step.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { flag = 1; next }
            /^## \[/ { flag = 0 }
            flag { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error::No CHANGELOG section found for $VERSION — refusing to publish empty release"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md
