# OpenSSF Scorecard — automated security best-practices scoring.
#
# Runs weekly + on pushes to main. Publishes results to the GitHub
# code-scanning tab (Security → Code scanning) and to the public
# OpenSSF Scorecard registry, which means:
#
#   1. The badge URL `https://api.securityscorecards.dev/projects/github.com/<owner>/<repo>/badge`
#      becomes live and renders the score.
#   2. Procurement teams (and curious users) can verify our score at
#      https://securityscorecards.dev/viewer/?uri=github.com/<owner>/<repo>
#      without us having to publish anything.
#
# This workflow needs a PAT-style secret only if we want branch-protection
# checks; for the score itself the default token is sufficient with the
# `id-token: write` permission below (used by the registry to verify the
# run actually came from this repo).

name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1"  # 06:00 UTC every Monday
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    # Forks should not submit their in-progress repo to the public OSSF
    # Scorecard registry on every push to main. The forker can lift this
    # guard once they're ready to publish their own scorecard.
    if: github.repository == 'rhatigan-agi/wisdom-studio'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        # Sigstore "imposter commit" verification requires the underlying COMMIT
        # SHA, not the annotated-tag-object SHA. v2.4.0's annotated-tag SHA
        # (ff5dd89...) is rejected by the publish step. v2.4.3 commit SHA below.
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        # Same gotcha as ossf/scorecard-action above: must be the underlying
        # COMMIT SHA, not the annotated-tag-object SHA, or sigstore's webapp
        # rejects this workflow's signed result with "imposter commit".
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7  # v4.35.3
        with:
          sarif_file: results.sarif
