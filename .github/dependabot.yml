version: 2

# Dependabot config for Wisdom Studio.
#
# Strategy: bundle low-risk minor/patch bumps into one PR per ecosystem per week,
# keep major-version bumps as individual PRs (they need manual review). This
# keeps the PR queue short and the audit trail clean.
#
# Non-LTS Node majors are ignored — Studio targets the active Node LTS line.

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(actions)"
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/apps/studio-api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-api)"
    open-pull-requests-limit: 5
    groups:
      pip-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/apps/studio-web"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-web)"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker)"
    ignore:
      # Studio targets Node LTS only — odd-numbered Node majors are not LTS.
      - dependency-name: "node"
        versions: ["21.x", "23.x", "25.x", "27.x"]
      # Python upgrades require manual ecosystem compatibility verification
      # (sentence-transformers, pydantic, fastapi). Tracked in issue #15.
      - dependency-name: "python"
    groups:
      docker-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
